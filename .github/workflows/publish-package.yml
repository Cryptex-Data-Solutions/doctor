name: Publish to GitHub Packages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        registry-url: https://npm.pkg.github.com
        scope: '@cryptex-data-solutions'

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ubuntu-publish-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ubuntu-publish-

    - run: npm ci
    - run: npm run build

    - name: Configure package for GitHub Packages
      run: |
        npm pkg set name="@cryptex-data-solutions/doctor"
        npm pkg set publishConfig.registry="https://npm.pkg.github.com"
        npm pkg set repository.url="https://github.com/Cryptex-Data-Solutions/doctor.git"

    - name: Set beta version (non-tag push)
      if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
      run: node scripts/update-package-version.js ${{ github.sha }}

    - name: Publish release
      if: ${{ startsWith(github.ref, 'refs/tags/v') }}
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish beta
      if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
      run: npm publish --tag next
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
