name: Automated tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ###################################
  ### Build and publish - Bash    ###
  ###################################
  publish_bash:
    name: Publish - ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-latest
            siteUrl: SITEURL_LINUX
          - name: macOS
            os: macos-latest
            siteUrl: SITEURL_MACOS

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ matrix.os }}-release-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ matrix.os }}-release-

    - run: npm ci
    - run: npm run build
    - run: npm link

    - name: Clone and prepare sample
      run: |
        git clone https://github.com/estruyf/doctor-sample
        node ./scripts/prepare-sample.js

    - name: Publish via Doctor
      run: |
        cd doctor-sample
        doctor publish \
          -a certificate \
          --appId "${{ secrets.APP_ID }}" \
          --tenant "${{ secrets.TENANT_ID }}" \
          --certificateBase64Encoded "${{ secrets.CERTIFICATE_BASE64 }}" \
          --password "${{ secrets.CERTIFICATE_PASSWORD }}" \
          -u "${{ secrets[matrix.siteUrl] }}" \
          --retryWhenFailed \
          --cleanStart \
          --cleanQuickLaunch \
          --cleanEnd \
          --skipSiteDesign \
          --confirm


  ##########################################
  ### Build and publish - PowerShell     ###
  ##########################################
  publish_pwsh:
    name: Publish - Windows PowerShell
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Get npm cache directory
      id: npm-cache
      shell: pwsh
      run: echo "dir=$(npm config get cache)" >> $env:GITHUB_OUTPUT

    - uses: actions/cache@v4
      with:
        path: ${{ steps.npm-cache.outputs.dir }}
        key: windows-pwsh-release-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          windows-pwsh-release-

    - run: npm ci
      shell: pwsh
    - run: npm run build
      shell: pwsh
    - run: npm link
      shell: pwsh

    - name: Clone and prepare sample
      shell: pwsh
      run: |
        git clone https://github.com/estruyf/doctor-sample
        node ./scripts/prepare-sample.js

    - name: Publish via Doctor
      shell: pwsh
      run: |
        cd doctor-sample
        doctor publish `
          -a certificate `
          --appId "${{ secrets.APP_ID }}" `
          --tenant "${{ secrets.TENANT_ID }}" `
          --certificateBase64Encoded "${{ secrets.CERTIFICATE_BASE64 }}" `
          --password "${{ secrets.CERTIFICATE_PASSWORD }}" `
          -u "${{ secrets.SITEURL_WINDOWS_POWERSHELL }}" `
          --retryWhenFailed `
          --cleanStart `
          --cleanQuickLaunch `
          --cleanEnd `
          --skipSiteDesign `
          --confirm


  ##########################################
  ### Build and publish - CMD            ###
  ##########################################
  publish_cmd:
    name: Publish - Windows CMD
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Get npm cache directory
      id: npm-cache
      shell: cmd
      run: |
        for /f "tokens=*" %%i in ('npm config get cache') do echo dir=%%i >> %GITHUB_OUTPUT%

    - uses: actions/cache@v4
      with:
        path: ${{ steps.npm-cache.outputs.dir }}
        key: windows-cmd-release-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          windows-cmd-release-

    - run: npm ci
      shell: cmd
    - run: npm run build
      shell: cmd
    - run: npm link
      shell: cmd

    - name: Clone and prepare sample
      shell: cmd
      run: |
        git clone https://github.com/estruyf/doctor-sample
        node ./scripts/prepare-sample.js

    - name: Publish via Doctor
      shell: cmd
      run: |
        cd doctor-sample
        doctor publish -a certificate --appId "${{ secrets.APP_ID }}" --tenant "${{ secrets.TENANT_ID }}" --certificateBase64Encoded "${{ secrets.CERTIFICATE_BASE64 }}" --password "${{ secrets.CERTIFICATE_PASSWORD }}" -u "${{ secrets.SITEURL_WINDOWS }}" --retryWhenFailed --cleanStart --cleanQuickLaunch --cleanEnd --skipSiteDesign --confirm


  ###################################
  ### Wait for SharePoint to sync ###
  ###################################
  wait_for_propagation:
    name: Wait for SharePoint propagation
    runs-on: ubuntu-latest
    needs: [publish_bash, publish_pwsh, publish_cmd]
    steps:
    - name: Wait 30s for SharePoint eventual consistency
      run: sleep 30


  ###################################
  ### E2E tests per published site ###
  ###################################
  e2e:
    name: E2E - ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [wait_for_propagation]

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            siteUrl: SITEURL_LINUX
          - name: macOS
            siteUrl: SITEURL_MACOS
          - name: Windows PowerShell
            siteUrl: SITEURL_WINDOWS_POWERSHELL
          - name: Windows CMD
            siteUrl: SITEURL_WINDOWS

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ubuntu-latest-e2e-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ubuntu-latest-e2e-

    - run: npm ci

    - name: Wait for SharePoint propagation
      run: sleep 30

    - name: Run E2E tests
      run: npx vitest run --config e2e/vitest.config.ts
      env:
        DOCTOR_E2E_SITE_URL: ${{ secrets[matrix.siteUrl] }}
        DOCTOR_E2E_APP_ID: ${{ secrets.APP_ID }}
        DOCTOR_E2E_TENANT_ID: ${{ secrets.TENANT_ID }}
        DOCTOR_E2E_CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
        DOCTOR_E2E_CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
