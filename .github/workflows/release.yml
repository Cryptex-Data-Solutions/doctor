name: Automated tests

on:
  push:
    branches:
      - dev
  release:
    types:
      - published
  # schedule:
  #   - cron: "0 0 */7 * *"
  workflow_dispatch:

jobs:
  #####################################
  ### Publishing on macOS and Linux ###
  #####################################
  build:
    name: Build ${{ matrix.os }} - Bash
    runs-on: ${{ matrix.os }}
    if: ${{ !contains(github.event.head_commit.message, '#docs') }}

    strategy:
      matrix:
        include:
          - node: 22
            os: macos-latest
            siteUrl: SITEURL_MACOS
          - node: 22
            os: ubuntu-latest
            siteUrl: SITEURL_LINUX

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ matrix.os }}-release-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ matrix.os }}-release-

      - run: npm i

      - run: npm start

      - run: npm link

      - name: Publish via Doctor
        run: |
          if [[ ${GITHUB_REF} != "refs/heads/main" ]]
          then
            git clone -b dev https://github.com/estruyf/doctor-sample
          else
            git clone https://github.com/estruyf/doctor-sample
          fi

          node ./scripts/prepare-sample.js
          cd doctor-sample

          startClean=""
          # Check on which branch it is running
          if [[ ${GITHUB_REF} == "refs/heads/main" || ${GITHUB_EVENT_NAME} == 'workflow_dispatch' ]]; then
            startClean="--cleanStart"
          fi

          skipPages=""
          # Check on which branch it is running
          if [[ ${GITHUB_EVENT_NAME} == "schedule" ]]; then
            skipPages="--skipExistingPages"
          fi

          doctor publish --auth certificate --certificateBase64Encoded "${{ secrets.CERTIFICATEBASE64ENCODED }}" --password "${{ secrets.PASSWORD }}" --appId "${{ secrets.APPID }}" --tenant "${{ secrets.TENANT }}" -u "${{ secrets[matrix.siteUrl] }}" --retryWhenFailed --cleanQuickLaunch --cleanEnd --confirm $startClean $skipPages
        env:
          DEBUG: ${{ secrets.DEBUG }}
          TRANSLATOR_KEY: ${{ secrets.TRANSLATOR_KEY }}

  #############################################
  ### Publishing on Windows with PowerShell ###
  #############################################
  build_pwsh:
    name: Build windows-latest - powershell
    runs-on: windows-latest
    if: ${{ !contains(github.event.head_commit.message, '#docs') }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Get npm cache directory
        id: npm-cache
        run: |
          echo "::set-output name=dir::$(npm config get cache)"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.npm-cache.outputs.dir }}
          key: ${{ runner.os }}-release-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-release-

      - run: npm i
        shell: powershell

      - run: npm start
        shell: powershell

      - run: npm link
        shell: powershell

      - name: Publish via Doctor
        run: |
          if (${env:GITHUB_REF} -ne 'refs/heads/main') {
            git clone -b dev https://github.com/estruyf/doctor-sample
          } else {
            git clone https://github.com/estruyf/doctor-sample
          }

          node ./scripts/prepare-sample.js
          cd doctor-sample

          $startClean = ""
          if (${env:GITHUB_REF} -eq 'refs/heads/main' -or ${env:GITHUB_EVENT_NAME} -eq 'workflow_dispatch') {
            $startClean = "--cleanStart"
          }

          $skipPages=""
          # Check on which branch it is running
          if (${env:GITHUB_EVENT_NAME} -eq 'schedule') {
            $skipPages="--skipExistingPages"
          }

          doctor publish --auth certificate --certificateBase64Encoded "${{ secrets.CERTIFICATEBASE64ENCODED }}" --password "${{ secrets.PASSWORD }}" --appId "${{ secrets.APPID }}" --tenant "${{ secrets.TENANT }}" -u "${{ secrets.SITEURL_WINDOWS_POWERSHELL }}" --retryWhenFailed --cleanQuickLaunch --cleanEnd --confirm $startClean $skipPages
        shell: powershell
        env:
          DEBUG: ${{ secrets.DEBUG }}
          TRANSLATOR_KEY: ${{ secrets.TRANSLATOR_KEY }}

  ######################################
  ### Publishing on Windows with CMD ###
  ######################################
  build_cmd:
    name: Build windows-latest - cmd
    runs-on: windows-latest
    if: ${{ !contains(github.event.head_commit.message, '#docs') }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Get npm cache directory
        id: npm-cache
        run: |
          echo "::set-output name=dir::$(npm config get cache)"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.npm-cache.outputs.dir }}
          key: ${{ runner.os }}-release-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-release-

      - run: npm i
        shell: cmd

      - run: npm start
        shell: cmd

      - run: npm link
        shell: cmd

      - name: Publish via Doctor
        run: |
          IF not "%GITHUB_REF%"=="refs/heads/main" (git clone -b dev https://github.com/estruyf/doctor-sample) else (git clone https://github.com/estruyf/doctor-sample)


          node ./scripts/prepare-sample.js
          cd doctor-sample

          IF "%GITHUB_REF%"=="refs/heads/main" (SET startClean="--cleanStart")
          IF "%GITHUB_EVENT_NAME%"=="workflow_dispatch" (SET startClean="--cleanStart")

          IF "%GITHUB_EVENT_NAME%"=="schedule" (SET skipPages="--skipExistingPages")

          doctor publish --auth certificate --certificateBase64Encoded "${{ secrets.CERTIFICATEBASE64ENCODED }}" --password "${{ secrets.PASSWORD }}" --appId "${{ secrets.APPID }}" --tenant "${{ secrets.TENANT }}" -u "${{ secrets.SITEURL_WINDOWS }}" --retryWhenFailed --cleanQuickLaunch --cleanEnd  --confirm %startClean% %skipPages%
        shell: cmd
        env:
          DEBUG: ${{ secrets.DEBUG }}
          TRANSLATOR_KEY: ${{ secrets.TRANSLATOR_KEY }}

  ###############################
  ### Release the new version ###
  ###############################
  release:
    name: Release the new version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build]
    if: ${{ github.event_name != 'schedule' && success() && !contains(github.event.head_commit.message, '#docs') }}

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm i

      - run: npm start

      - name: Publish release
        run: npm publish --access public
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}

      - name: Update the package version
        if: github.ref == 'refs/heads/dev'
        run: node scripts/update-package-version.js $GITHUB_RUN_ID

      - name: Publish beta release
        run: npm publish --tag next --access public
        if: github.ref == 'refs/heads/dev'
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
