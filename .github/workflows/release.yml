name: Automated tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ###################################
  ### Build and publish per OS    ###
  ###################################
  publish:
    name: Publish - ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-latest
            shell: bash
            siteUrl: SITEURL_LINUX
          - name: macOS
            os: macos-latest
            shell: bash
            siteUrl: SITEURL_MACOS
          - name: Windows PowerShell
            os: windows-latest
            shell: pwsh
            siteUrl: SITEURL_WINDOWS_POWERSHELL
          - name: Windows CMD
            os: windows-latest
            shell: cmd
            siteUrl: SITEURL_WINDOWS

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ matrix.os }}-${{ matrix.shell }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ matrix.os }}-${{ matrix.shell }}-

    - run: npm ci
      shell: ${{ matrix.shell }}

    - run: npm run build
      shell: ${{ matrix.shell }}

    - run: npm link
      shell: ${{ matrix.shell }}

    - name: Clone doctor-sample
      run: git clone https://github.com/estruyf/doctor-sample
      shell: ${{ matrix.shell }}

    - name: Prepare sample config
      run: node ./scripts/prepare-sample.js
      shell: ${{ matrix.shell }}

    - name: Publish via Doctor (bash)
      if: matrix.shell == 'bash'
      run: |
        cd doctor-sample
        doctor publish \
          -a certificate \
          --appId "${{ secrets.APP_ID }}" \
          --tenant "${{ secrets.TENANT_ID }}" \
          --certificateBase64Encoded "${{ secrets.CERTIFICATE_BASE64 }}" \
          --password \
          -u "${{ secrets[matrix.siteUrl] }}" \
          --retryWhenFailed \
          --cleanStart \
          --cleanQuickLaunch \
          --cleanEnd \
          --confirm
      shell: bash

    - name: Publish via Doctor (pwsh)
      if: matrix.shell == 'pwsh'
      run: |
        cd doctor-sample
        doctor publish `
          -a certificate `
          --appId "${{ secrets.APP_ID }}" `
          --tenant "${{ secrets.TENANT_ID }}" `
          --certificateBase64Encoded "${{ secrets.CERTIFICATE_BASE64 }}" `
          --password `
          -u "${{ secrets[matrix.siteUrl] }}" `
          --retryWhenFailed `
          --cleanStart `
          --cleanQuickLaunch `
          --cleanEnd `
          --confirm
      shell: pwsh

    - name: Publish via Doctor (cmd)
      if: matrix.shell == 'cmd'
      run: |
        cd doctor-sample
        doctor publish -a certificate --appId "${{ secrets.APP_ID }}" --tenant "${{ secrets.TENANT_ID }}" --certificateBase64Encoded "${{ secrets.CERTIFICATE_BASE64 }}" --password -u "${{ secrets[matrix.siteUrl] }}" --retryWhenFailed --cleanStart --cleanQuickLaunch --cleanEnd --confirm
      shell: cmd


  ###################################
  ### E2E tests per published site ###
  ###################################
  e2e:
    name: E2E - ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [publish]

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            siteUrl: SITEURL_LINUX
          - name: macOS
            siteUrl: SITEURL_MACOS
          - name: Windows PowerShell
            siteUrl: SITEURL_WINDOWS_POWERSHELL
          - name: Windows CMD
            siteUrl: SITEURL_WINDOWS

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ubuntu-latest-e2e-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ubuntu-latest-e2e-

    - run: npm ci

    - name: Run E2E tests
      run: npx vitest run --config e2e/vitest.config.ts
      env:
        DOCTOR_E2E_SITE_URL: ${{ secrets[matrix.siteUrl] }}
        DOCTOR_E2E_APP_ID: ${{ secrets.APP_ID }}
        DOCTOR_E2E_TENANT_ID: ${{ secrets.TENANT_ID }}
        DOCTOR_E2E_CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
